{% extends 'base/main.html' %}
{% block content %}

<div class="page-card form-box">
    <h1>Login</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <p class="link-text">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </p>
</div>

{% endblock content %}
