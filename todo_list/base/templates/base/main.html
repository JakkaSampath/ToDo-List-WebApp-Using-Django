<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            min-height: 100vh;
            padding: 40px 15px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
        }

        h1, h2, h3 {
            color: #2f3542;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        a {
            text-decoration: none;
            color: #3742fa;
            font-weight: bold;
        }

        a:hover {
            color: #ff4757;
        }

        /* Header section */
        .header-bar {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header-bar h1,
        .header-bar h2 {
            color: white;
            margin-bottom: 8px;
        }

        .header-bar span {
            background-color: white;
            color: #ff4757;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* Buttons */
        button,
        input[type="submit"] {
            background-color: #3742fa;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover,
        input[type="submit"]:hover {
            background-color: #ff4757;
        }

        .logout-btn {
            background-color: white;
            color: #ff4757;
        }

        .logout-btn:hover {
            background-color: #ff4757;
            color: white;
        }

        .add-btn {
            display: inline-block;
            background-color: #2ed573;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            margin-bottom: 15px;
        }

        .add-btn:hover {
            background-color: #1eae5f;
            color: white;
        }

        .back-link {
            display: inline-block;
            background-color: #f1f2f6;
            color: #2f3542;
            padding: 8px 14px;
            border-radius: 20px;
            margin-bottom: 18px;
        }

        .back-link:hover {
            background-color: #3742fa;
            color: white;
        }

        /* Search section */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-form input {
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            width: 240px;
        }

        .search-form input:focus {
            border-color: #3742fa;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            overflow: hidden;
            border-radius: 12px;
        }

        th {
            background-color: #3742fa;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        tr:hover {
            background-color: #f1f5ff;
        }

        .task-title {
            font-weight: bold;
            color: #2f3542;
        }

        .action-btn {
            color: white;
            padding: 7px 12px;
            border-radius: 18px;
            font-size: 13px;
            display: inline-block;
        }

        .view-btn {
            background-color: #1e90ff;
        }

        .edit-btn {
            background-color: #ffa502;
        }

        .delete-btn {
            background-color: #ff4757;
        }

        .view-btn:hover,
        .edit-btn:hover,
        .delete-btn:hover {
            color: white;
            opacity: 0.8;
        }

        .empty-message {
            text-align: center;
            color: #777;
            padding: 20px;
        }

        /* Forms */
        .page-card {
            max-width: 550px;
            margin: 20px auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 6px 18px rgba(0, 0, 0, 0.15);
        }

        .page-card h1,
        .page-card h2 {
            text-align: center;
        }

        .form-box form p {
            margin-bottom: 15px;
        }

        .form-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #3742fa;
        }

        .form-box input,
        .form-box textarea,
        .form-box select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        .form-box input:focus,
        .form-box textarea:focus,
        .form-box select:focus {
            border-color: #3742fa;
        }

        .form-box button,
        .form-box input[type="submit"] {
            width: 100%;
            margin-top: 10px;
        }

        .link-text {
            text-align: center;
            margin-top: 18px;
        }

        .delete-box {
            border-left: 5px solid #ff4757;
        }

        .delete-task-name {
            color: #ff4757;
            font-weight: bold;
        }

        .danger-btn {
            width: 100%;
            background-color: #ff4757;
            margin-top: 15px;
        }

        .danger-btn:hover {
            background-color: #d63031;
        }

        /* Task detail */
        .task-detail-card {
            max-width: 650px;
        }

        .task-detail-title {
            background-color: #3742fa;
            color: white;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .task-detail-title h1 {
            color: white;
            margin: 0;
        }

        .task-description {
            background-color: #f1f5ff;
            padding: 18px;
            border-radius: 12px;
            border-left: 5px solid #3742fa;
        }

        .helptext {
            display: block;
            font-size: 12px;
            color: #777;
            margin-top: 5px;
        }

        .errorlist {
            list-style: none;
            background-color: #ffe6e9;
            color: #d63031;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        /* Mobile screen */
        @media (max-width: 700px) {
            body {
                padding: 20px 10px;
            }

            .container {
                padding: 18px;
            }

            .header-bar {
                text-align: center;
                justify-content: center;
            }

            .top-section {
                flex-direction: column;
                align-items: stretch;
            }

            .search-form {
                width: 100%;
            }

            .search-form input,
            .search-form button {
                width: 100%;
            }

            table {
                font-size: 13px;
            }

            th,
            td {
                padding: 10px;
            }

            .action-btn {
                padding: 6px 9px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        {% block content %}

        {% endblock content %}
    </div>

</body>
</html>
